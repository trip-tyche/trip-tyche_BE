spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=MySQL;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        globally_quoted_identifiers: false
    show-sql: true

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: test-kakao-client-id
            client-secret: test-kakao-secret-key-at-least-32bytes!!
            redirect-uri: "{baseUrl}/signin/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: profile_nickname, account_email
            client-name: Kakao
          google:
            client-id: test-google-client-id
            client-secret: test-google-secret-key-at-least-32bytes!!
            redirect-uri: "{baseUrl}/signin/oauth2/code/google"
            authorization-grant-type: authorization_code
            scope: profile, email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  cloud:
    aws:
      s3:
        bucketName: test-bucket
        endpoint: https://test-endpoint.example.com
      credentials:
        accessKey: test-access-key
        secretKey: test-secret-key
      region:
        static: ap-chuncheon-1

  redirect:
    url: http://localhost:8080
    failure-url: http://localhost:8080/login?error

KAKAO_OAUTH_CLIENT_SECRET: test-kakao-secret-key-at-least-32bytes!!
GOOGLE_OAUTH_CLIENT_SECRET: test-google-secret-key-at-least-32bytes!!
GUEST_JWT_SECRET: test-guest-secret-key-at-least-32bytes!!

jwt:
  access-token-expiry-seconds: 3600
  refresh-token-expiry-seconds: 2592000
  guest-token-expiry-seconds: 14400

trip:
  soft-delete:
    retention-days: 30
