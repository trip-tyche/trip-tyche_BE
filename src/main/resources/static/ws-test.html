<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>WebSocket Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
  <style>
    body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
    h2 { color: #569cd6; }
    .section { margin-bottom: 20px; }
    label { display: block; margin-bottom: 4px; color: #9cdcfe; }
    input { width: 400px; padding: 6px; background: #2d2d2d; border: 1px solid #555; color: #d4d4d4; border-radius: 4px; }
    button { padding: 8px 16px; margin-right: 8px; border: none; border-radius: 4px; cursor: pointer; font-family: monospace; }
    #connectBtn { background: #3a7d44; color: white; }
    #disconnectBtn { background: #7d3a3a; color: white; }
    #clearBtn { background: #555; color: white; }
    #status { padding: 8px; border-radius: 4px; margin: 10px 0; font-weight: bold; }
    .connected { background: #1e3a1e; color: #4ec94e; border: 1px solid #3a7d44; }
    .disconnected { background: #3a1e1e; color: #e06c75; border: 1px solid #7d3a3a; }
    .connecting { background: #3a3a1e; color: #e5c07b; border: 1px solid #7d6a3a; }
    #log { background: #2d2d2d; border: 1px solid #555; border-radius: 4px; padding: 12px; height: 400px; overflow-y: auto; }
    .log-info { color: #9cdcfe; }
    .log-success { color: #4ec94e; }
    .log-error { color: #e06c75; }
    .log-message { color: #e5c07b; border-left: 3px solid #e5c07b; padding-left: 8px; margin: 4px 0; white-space: pre; }
    .log-time { color: #666; font-size: 11px; }
    .hint { color: #888; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>
<h2>WebSocket Notification Test</h2>
<div class="section">
  <label>Access Token</label>
  <input id="token" placeholder="test-token API로 발급받은 토큰" />
  <div class="hint">* Handshake URL 쿼리 파라미터로 전달됩니다 (?token=...)</div>
</div>
<div class="section">
  <label>userId (알림 수신 대상)</label>
  <input id="userId" placeholder="1" style="width:100px" />
</div>
<div id="status" class="disconnected">● 연결 안 됨</div>
<div class="section">
  <button id="connectBtn" onclick="connect()">연결</button>
  <button id="disconnectBtn" onclick="disconnect()" disabled>연결 해제</button>
  <button id="clearBtn" onclick="clearLog()">로그 지우기</button>
</div>
<div id="log"></div>
<script>
  var stompClient = null;
  function log(msg, type) {
    if (!type) type = 'info';
    var logDiv = document.getElementById('log');
    var time = new Date().toLocaleTimeString('ko-KR');
    var div = document.createElement('div');
    div.className = 'log-' + type;
    div.innerHTML = '<span class="log-time">[' + time + ']</span> ' + msg;
    logDiv.appendChild(div);
    logDiv.scrollTop = logDiv.scrollHeight;
  }
  function setStatus(text, type) {
    var el = document.getElementById('status');
    el.textContent = text;
    el.className = type;
  }
  function connect() {
    var token = document.getElementById('token').value.trim();
    var userId = document.getElementById('userId').value.trim();
    if (!userId) { log('userId를 입력하세요', 'error'); return; }
    if (!token) { log('Access Token을 입력하세요', 'error'); return; }
    var wsUrl = 'ws://localhost:8080/ws?token=' + encodeURIComponent(token);
    setStatus('● 연결 중...', 'connecting');
    log('연결 시도: ws://localhost:8080/ws?token=...', 'info');
    var ws = new WebSocket(wsUrl);
    stompClient = Stomp.over(ws);
    stompClient.debug = null;
    stompClient.connect({}, function(frame) {
      setStatus('● 연결됨', 'connected');
      log('STOMP 연결 성공', 'success');
      document.getElementById('connectBtn').disabled = true;
      document.getElementById('disconnectBtn').disabled = false;
      var topic = '/topic/share-notifications/' + userId;
      log('구독 시작: ' + topic, 'info');
      stompClient.subscribe(topic, function(message) {
        log('알림 수신!', 'success');
        var div = document.createElement('div');
        div.className = 'log-message';
        try {
          var parsed = JSON.parse(message.body);
          div.textContent = JSON.stringify(parsed, null, 2);
        } catch(e) { div.textContent = message.body; }
        document.getElementById('log').appendChild(div);
        document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
      });
      log('구독 완료 - 다른 계정으로 이 userId에게 공유 요청을 보내보세요', 'success');
    }, function(error) {
      setStatus('● 연결 실패', 'disconnected');
      log('연결 실패: ' + error, 'error');
      document.getElementById('connectBtn').disabled = false;
      document.getElementById('disconnectBtn').disabled = true;
    });
  }
  function disconnect() {
    if (stompClient) {
      stompClient.disconnect(function() {
        setStatus('● 연결 안 됨', 'disconnected');
        log('연결 해제됨', 'info');
      });
    }
    document.getElementById('connectBtn').disabled = false;
    document.getElementById('disconnectBtn').disabled = true;
  }
  function clearLog() { document.getElementById('log').innerHTML = ''; }
</script>
</body>
</html>
